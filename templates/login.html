<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>로그인</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Segoe UI", "Malgun Gothic", sans-serif;
      background: radial-gradient(circle at top, #eef4ff 0%, #f7f8fb 45%, #eef1f6 100%);
      color: #1f2937;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .card {
      width: 100%;
      max-width: 430px;
      background: rgba(255,255,255,0.96);
      border-radius: 22px;
      padding: 34px 30px 28px;
      box-shadow: 0 16px 44px rgba(45, 63, 104, 0.13);
      border: 1px solid #e7ecf5;
      backdrop-filter: blur(8px);
    }
    .badge {
      display: inline-block;
      padding: 6px 12px;
      border-radius: 999px;
      background: #111827;
      color: #fff;
      font-size: 12px;
      font-weight: 700;
      margin-bottom: 14px;
    }
    h1 {
      margin: 0 0 8px;
      font-size: 30px;
    }
    .desc {
      margin: 0 0 24px;
      color: #667085;
      line-height: 1.55;
      font-size: 14px;
    }
    .form-group { margin-bottom: 16px; }
    label {
      display: block;
      margin-bottom: 8px;
      font-size: 14px;
      font-weight: 600;
      color: #344054;
    }
    input {
      width: 100%;
      padding: 13px 14px;
      border: 1px solid #d5dce8;
      border-radius: 12px;
      font-size: 15px;
      outline: none;
      transition: border-color .15s, box-shadow .15s;
      background: #fff;
    }
    input:focus {
      border-color: #111827;
      box-shadow: 0 0 0 4px rgba(17, 24, 39, 0.08);
    }
    .message {
      min-height: 20px;
      margin: 4px 0 16px;
      font-size: 13px;
      color: #b42318;
    }
    .actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 8px;
    }
    button, .link-btn {
      border: none;
      border-radius: 12px;
      padding: 13px 16px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      text-decoration: none;
      text-align: center;
      transition: transform .12s, opacity .12s, background .12s;
    }
    button:hover, .link-btn:hover { transform: translateY(-1px); }
    .primary {
      flex: 1 1 180px;
      background: #111827;
      color: #fff;
    }
    .secondary {
      flex: 1 1 140px;
      background: #eef2f7;
      color: #1f2937;
    }
    .help {
      margin-top: 20px;
      padding: 14px 15px;
      border-radius: 14px;
      background: #f8fafc;
      border: 1px solid #e6ebf2;
      font-size: 13px;
      color: #667085;
      line-height: 1.55;
    }
    .help strong { color: #111827; }
  </style>
</head>
<body>
  <section class="card">
    <span class="badge">LOGIN</span>
    <h1>로그인</h1>
    <p class="desc">아이디와 비밀번호를 입력해 로그인합니다. 이 폼은 Flask의 <strong>POST /login</strong> 라우트로 연결하는 뼈대입니다.</p>

    <form action="/login" method="post" id="loginForm">
      <div class="form-group">
        <label for="user_id">아이디</label>
        <input type="text" id="user_id" name="user_id" placeholder="아이디 입력" />
      </div>

      <div class="form-group">
        <label for="passwd">비밀번호</label>
        <input type="password" id="passwd" name="passwd" placeholder="비밀번호 입력" />
      </div>

      <p class="message" id="loginMessage"></p>

      <div class="actions">
        <button type="submit" class="primary">로그인</button>
        <a href="/signup" class="link-btn secondary">회원가입으로 이동</a>
      </div>
    </form>

    <div class="help">
      <strong>연결 포인트</strong><br />
      session 저장, 로그인 실패 메시지 표시, 로그인 성공 후 메모 페이지 이동은 Flask 쪽에서 붙이면 된다.
    </div>
  </section>
</body>
</html>
