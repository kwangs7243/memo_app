<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>로그인</title>
  <link rel="stylesheet" href="/static/login.css">
</head>
<body>
  <section class="card">
    <span class="badge">LOGIN</span>
    <h1>로그인</h1>
    <p class="desc"><strong>메모</strong>를 사용하기 위한 아이디와 비밀번호를 입력해 로그인합니다.</p>

    <form action="/login" method="post" id="loginForm">
      <div class="form-group">
        <label for="user_id">아이디</label>
        <input type="text" id="user_id" name="user_id" placeholder="아이디 입력" value="{{user_id or ''}}" oninput="id_length_check()"/>
      </div>

      <div class="form-group">
        <label for="passwd">비밀번호</label>
        <input type="password" id="passwd" name="passwd" placeholder="비밀번호 입력" />
      </div>

      <p class="message" id="loginMessage"></p>
      <p class="server_msg">{{ login_msg or '' }}</p>

      <div class="actions">
        <button type="submit" class="primary">로그인</button>
        <a href="/signup" class="link-btn secondary">회원가입으로 이동</a>
      </div>
    </form>

    <div class="help">
      <strong>연결 포인트</strong><br />
      session 저장, 로그인 실패 메시지 표시, 로그인 성공 후 메모 페이지 이동은 Flask 쪽에서 붙이면 된다.
    </div>
  </section>
</body>
<script src="/static/login.js"></script>
</html>
