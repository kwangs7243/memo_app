<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Memo Manager</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="wrap">
        <header class="topbar">
            <h1>Memo Manager</h1>
        </header>
        <main class="layout">
            <section class="panel form-panel">
                <h2>메모 작성</h2>
                <form action="/add" method="post" class="memo-form">
                    <textarea name="content" placeholder="메모를 입력하세요"></textarea>

                    <div class="form-row">
                        <label class="check-label">
                            <input type="checkbox" name="important">
                            <span>중요 메모</span>
                        </label>
                    </div>

                    <div class="form-row">
                        <button type="submit" class="primary-btn">추가</button>
                    </div>
                </form>
            </section>

            <section class="panel control-panel">
                <h2>검색 / 필터 / 정렬</h2>

                <form action="/search" method="post" class="control-group">
                    <div class="inline-group">
                        <input type="text" name="keyword" placeholder="검색어 입력">
                        <button type="submit" class="primary-btn">검색</button>
                    </div>
                </form>

                <form action="/toggle-important-filter" method="post" class="control-group">
                    <button type="submit" class="ghost-btn">중요 메모만 보기</button>
                </form>

                <form action="/sort" method="post" class="control-group">
                    <div class="inline-group">
                        <button type="submit" name="sort_by" value="created_at" class="ghost-btn">날짜 정렬</button>
                        <button type="submit" name="sort_by" value="content" class="ghost-btn">내용 정렬</button>
                    </div>
                </form>

                <form action="/reset" method="post" class="control-group">
                    <button type="submit" class="danger-btn">상태 초기화</button>
                </form>
            </section>

            <section class="panel list-panel">
                <div class="list-header">
                    <h2>메모 목록</h2>
                    <div class="list-count">{{ memos|length }} items</div>
                </div>
                {% if not memos %}
                <p>메모가 없습니다.</p>
                {% else %}
                {% for memo in memos %}
                <div class="memo-list">
                    {% if memo.important %}
                    <article class="memo-card important">
                        <div class="memo-main">
                            <div class="memo-meta">
                                <span class="badge">중요</span>
                                <span class="created-at">{{ memo.created_at }}</span>
                            </div>
                            <p class="memo-content">{{ memo.content }}</p>
                        </div>
                        <div class="memo-actions">
                            <form action="/toggle-important" method="post">
                                <input type="hidden" name="id" value={{memo.id}}>
                                <button type="submit" class="ghost-btn small">중요 해제</button>
                            </form>
                            <form action="/delete" method="post">
                                <input type="hidden" name="id" value={{memo.id}}>
                                <button type="submit" class="danger-btn small">삭제</button>
                            </form>
                        </div>
                    </article>
                    {% else %}
                    <article class="memo-card">
                        <div class="memo-main">
                            <div class="memo-meta">
                                <span class="created-at">{{ memo.created_at }}</span>
                            </div>
                            <p class="memo-content">{{ memo.content }}</p>
                        </div>
                        <div class="memo-actions">
                            <form action="/toggle-important" method="post">
                                <input type="hidden" name="id" value="{{memo.id}}">
                                <button type="submit" class="ghost-btn small">중요 표시</button>
                            </form>
                            <form action="/delete" method="post">
                                <input type="hidden" name="id" value="{{memo.id}}">
                                <button type="submit" class="danger-btn small">삭제</button>
                            </form>
                        </div>
                    </article>
                    {% endif %}
                </div>
                {% endfor %}
                {% endif %}
            </section>
        </main>
    </div>
</body>
</html>
