<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>회원가입</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Segoe UI", "Malgun Gothic", sans-serif;
      background: linear-gradient(135deg, #f4f7fb 0%, #e9efff 100%);
      color: #1f2937;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .card {
      width: 100%;
      max-width: 460px;
      background: #ffffff;
      border-radius: 20px;
      padding: 34px 30px 28px;
      box-shadow: 0 18px 40px rgba(37, 59, 115, 0.14);
      border: 1px solid #e7ecf5;
    }
    .eyebrow {
      display: inline-block;
      padding: 6px 12px;
      border-radius: 999px;
      background: #eef4ff;
      color: #3159c9;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.02em;
      margin-bottom: 14px;
    }
    h1 {
      margin: 0 0 8px;
      font-size: 30px;
    }
    .desc {
      margin: 0 0 24px;
      color: #667085;
      line-height: 1.55;
      font-size: 14px;
    }
    .form-group { margin-bottom: 16px; }
    label {
      display: block;
      margin-bottom: 8px;
      font-size: 14px;
      font-weight: 600;
      color: #344054;
    }
    input {
      width: 100%;
      padding: 13px 14px;
      border: 1px solid #d5dce8;
      border-radius: 12px;
      font-size: 15px;
      outline: none;
      transition: border-color .15s, box-shadow .15s;
      background: #fff;
    }
    input:focus {
      border-color: #4f7cff;
      box-shadow: 0 0 0 4px rgba(79, 124, 255, 0.12);
    }
    .hint {
      margin-top: 6px;
      font-size: 12px;
      color: #667085;
    }
    .message {
      min-height: 20px;
      margin: 4px 0 16px;
      font-size: 13px;
      color: #b42318;
    }
    .actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 8px;
    }
    button, .link-btn {
      border: none;
      border-radius: 12px;
      padding: 13px 16px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      text-decoration: none;
      text-align: center;
      transition: transform .12s, opacity .12s, background .12s;
    }
    button:hover, .link-btn:hover { transform: translateY(-1px); }
    .primary {
      flex: 1 1 180px;
      background: #4f7cff;
      color: white;
    }
    .secondary {
      flex: 1 1 140px;
      background: #eef2f7;
      color: #1f2937;
    }
    .footer {
      margin-top: 22px;
      font-size: 13px;
      color: #667085;
      text-align: center;
    }
    .footer a {
      color: #3159c9;
      text-decoration: none;
      font-weight: 700;
    }
  </style>
</head>
<body>
  <section class="card">
    <span class="eyebrow">MEMO MANAGER</span>
    <h1>회원가입</h1>
    <p class="desc">아이디와 비밀번호를 입력해 계정을 만듭니다. 이 폼은 Flask의 <strong>POST /signup</strong> 라우트로 연결하는 뼈대입니다.</p>

    <form action="/signup" method="post" id="signupForm">
      <div class="form-group">
        <label for="user_id">아이디</label>
        <input type="text" id="user_id" name="user_id" placeholder="아이디 입력" />
        <div class="hint">영문, 숫자 조합 / 최소 길이 검사는 JS에서 처리 예정</div>
      </div>

      <div class="form-group">
        <label for="passwd">비밀번호</label>
        <input type="password" id="passwd" name="passwd" placeholder="비밀번호 입력" />
      </div>

      <div class="form-group">
        <label for="passwd_check">비밀번호 확인</label>
        <input type="password" id="passwd_check" name="passwd_check" placeholder="비밀번호 다시 입력" />
      </div>

      <div class="form-group">
        <label for="user_name">이름</label>
        <input type="text" id="user_name" name="user_name" placeholder="이름 입력" />
      </div>

      <p class="message" id="signupMessage"></p>

      <div class="actions">
        <button type="submit" class="primary">회원가입</button>
        <a href="/login" class="link-btn secondary">로그인으로 이동</a>
      </div>
    </form>

    <div class="footer">
      이미 계정이 있으면 <a href="/login">로그인</a>
    </div>
  </section>
</body>
</html>
