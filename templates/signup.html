<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>회원가입</title>
  <link rel="stylesheet" href="/static/signup.css">
</head>
<body>
  <section class="card">
    <span class="eyebrow">MEMO MANAGER</span>
    <h1>회원가입</h1>
    <p class="desc"><strong>메모</strong>를 사용하기 위한 아이디와 비밀번호를 입력해 계정을 만듭니다.</p>
    
    <form action="/signup" method="post" id="signupForm" onsubmit="return check_info()">
      <div class="form-group">
        <label for="user_id">아이디</label>
        <input type="text" id="user_id" name="user_id" placeholder="아이디 입력" value="{{user_id or ''}}" oninput="id_length_check()"/>
        <div class="hint"></div>
        <div class="server_msg">{{ id_msg }}</div>
      </div>
      
      <div class="form-group">
        <label for="passwd">비밀번호</label>
        <input type="password" id="passwd" name="passwd" placeholder="비밀번호 입력" />
      </div>
      
      <div class="form-group">
        <label for="passwd_check">비밀번호 확인</label>
        <input type="password" id="passwd_check" name="passwd_check" placeholder="비밀번호 다시 입력" />
      </div>
      
      <p class="message" id="signupMessage"></p>
      
      <div class="actions">
        <button type="submit" class="primary" >회원가입</button>
        <a href="/login" class="link-btn secondary">로그인으로 이동</a>
      </div>
    </form>
    
    <div class="footer">
      이미 계정이 있으면 <a href="/login">로그인</a>
    </div>
  </section>
</body>
<script src="/static/signup.js"></script>
</html>
